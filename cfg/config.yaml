camera:
  width: 4608
  height: 2592
  enc: "jpg"
  quality: 95
  timeout_ms: 300
  shutter_us: 8000
  gain: 1.0
  awb_gains: ""       # or "1.45,1.50"
  lens_pos: 7.879     # match calibration
  quiet: true

laser:
  wavelength_nm: 650
  hsv_red1_lower: [0, 120, 60]
  hsv_red1_upper: [10, 255, 255]
  hsv_red2_lower: [170, 120, 60]
  hsv_red2_upper: [179, 255, 255]

processing:
  roi: null
  blur_ksize: 3
  morph_ksize: 3
  morph_iters: 1
  min_pixels_per_row: 5
  subpixel: true

stage:
  step_pin: 23
  dir_pin: 24
  microstep: 8
  lead_mm_per_rev: 8.0